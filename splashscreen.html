<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISAMS Loading...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      border-radius: 12px;
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      width: 100px;
      height: 100px;
      z-index: 2;
      animation: pulse 2s infinite ease-in-out;
    }

    .spinner {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 4px solid rgba(59, 130, 246, 0.1);
      border-top: 4px solid #008a45;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 1;
    }

    .text {
      color: #008a45;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 0.8s ease-out forwards 0.3s;
    }

    .subtext {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: -15px;
      opacity: 0;
      animation: fadeIn 0.8s ease-out forwards 0.6s;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo-container">
      <div class="spinner"></div>
      <!-- Points to the image asset folder, Vite will resolve this -->
      <img src="/src/assets/images/isams_logo_icon.svg" alt="ISAMS Logo" class="logo">
    </div>
    <span class="text">ISAMS</span>
    <span class="subtext">Integrated Smart Academic Management System</span>
  </div>
</body>

</html>
